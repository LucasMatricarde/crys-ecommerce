<!-- @dsCard group="Colors" viewport="700x150" name="Live Resin Amber — primary accent" subtitle="Molten amber ramp, brand action color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); }
  .name { color: var(--text-primary); font-size: 11px; margin-top: 8px; }
  .hex { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--amber-honey)"></div><div class="name">honey</div><div class="hex">#FFD89B</div></div>
  <div class="sw"><div class="chip" style="background:var(--amber-core)"></div><div class="name">core</div><div class="hex">#F5A623</div></div>
  <div class="sw"><div class="chip" style="background:var(--amber-deep)"></div><div class="name">deep</div><div class="hex">#C8761A</div></div>
  <div class="sw"><div class="chip" style="background:var(--amber-burnt)"></div><div class="name">burnt</div><div class="hex">#7A3E0F</div></div>
</div>
</body>
</html>
