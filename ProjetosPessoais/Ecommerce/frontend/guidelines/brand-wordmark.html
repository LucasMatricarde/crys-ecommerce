<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); height: 200px; display: flex; align-items: center; gap: 40px; padding: 0 40px;
    background-image: radial-gradient(420px 200px at 88% 50%, var(--tint-violet-12), transparent 70%); overflow: hidden; }
  .mark { font-family: var(--font-display); font-weight: 800; font-size: 64px; color: var(--accent-primary); letter-spacing: -.02em; }
  .copy { display: flex; flex-direction: column; gap: 8px; }
  .tag { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--text-primary); }
  .sub { font-family: var(--font-body); font-size: 14px; color: var(--text-muted); }
  .blob { margin-left: auto; width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(closest-side at 40% 40%, var(--amber-honey) 0%, rgba(245,166,35,.95) 45%, rgba(200,118,26,.8) 75%, rgba(122,62,15,.6) 100%);
    box-shadow: var(--shadow-molten); }
</style>
</head>
<body>
  <span class="mark">CRYS.</span>
  <div class="copy">
    <span class="tag">Resina viva. Pura arte.</span>
    <span class="sub">Extrações artesanais de cannabis premium.</span>
  </div>
  <div class="blob"></div>
</body>
</html>
