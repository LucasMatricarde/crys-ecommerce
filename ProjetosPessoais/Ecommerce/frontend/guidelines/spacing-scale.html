<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base · named by multiple" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); padding: 22px 24px; font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--amber-core); border-radius: 2px; width: 16px; }
  .t { font-size: 9px; color: var(--text-muted); }
  .v { font-size: 9px; color: var(--text-primary); }
</style>
</head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height:var(--spacing-1)"></div><span class="v">4</span><span class="t">1</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-2)"></div><span class="v">8</span><span class="t">2</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-3)"></div><span class="v">12</span><span class="t">3</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-4)"></div><span class="v">16</span><span class="t">4</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-6)"></div><span class="v">24</span><span class="t">6</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-8)"></div><span class="v">32</span><span class="t">8</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-12)"></div><span class="v">48</span><span class="t">12</span></div>
  <div class="col"><div class="bar" style="height:var(--spacing-16)"></div><span class="v">64</span><span class="t">16</span></div>
</div>
</body>
</html>
