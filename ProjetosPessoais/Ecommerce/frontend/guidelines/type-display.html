<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); padding: 22px 24px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .item { display: flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 150px; flex-shrink: 0; }
  .spec { font-family: var(--font-display); color: var(--text-primary); }
</style>
</head>
<body>
<div class="stack">
  <div class="item"><span class="meta">Display · 72 · ExtraBold</span><span class="spec" style="font-weight:800;font-size:46px;letter-spacing:-.02em;line-height:1">Crystalline</span></div>
  <div class="item"><span class="meta">H1 · 48 · ExtraBold</span><span class="spec" style="font-weight:800;font-size:34px;letter-spacing:-.02em;line-height:1">Resina viva</span></div>
  <div class="item"><span class="meta">H2 · 32 · Bold</span><span class="spec" style="font-weight:700;font-size:26px;letter-spacing:-.01em;line-height:1">Extrações artesanais</span></div>
  <div class="item"><span class="meta">H3 · 24 · SemiBold</span><span class="spec" style="font-weight:600;font-size:21px;line-height:1">Pureza Premium</span></div>
</div>
</body>
</html>
