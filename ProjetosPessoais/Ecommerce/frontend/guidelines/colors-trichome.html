<!-- @dsCard group="Colors" viewport="700x150" name="Trichome Green — botanical" subtitle="Deep forest to frosted ice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); }
  .name { color: var(--text-primary); font-size: 11px; margin-top: 8px; }
  .hex { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--trichome-deep)"></div><div class="name">deep</div><div class="hex">#0E3B2A</div></div>
  <div class="sw"><div class="chip" style="background:var(--trichome-core)"></div><div class="name">core</div><div class="hex">#1F8A4C</div></div>
  <div class="sw"><div class="chip" style="background:var(--trichome-frost)"></div><div class="name">frost</div><div class="hex">#B8F0CE</div></div>
  <div class="sw"><div class="chip" style="background:var(--trichome-ice)"></div><div class="name">ice</div><div class="hex">#E8F8EF</div></div>
</div>
</body>
</html>
