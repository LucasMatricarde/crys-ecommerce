<!-- @dsCard group="Colors" viewport="700x150" name="Oil-Slick Iridescent — strain accents" subtitle="Violet · magenta · cyan psychedelic spectrum" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); }
  .name { color: var(--text-primary); font-size: 11px; margin-top: 8px; }
  .hex { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
  .use { color: var(--text-muted); font-size: 9px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--iridescent-violet)"></div><div class="name">violet</div><div class="hex">#7B5CFF</div><div class="use">indica · focus</div></div>
  <div class="sw"><div class="chip" style="background:var(--iridescent-magenta)"></div><div class="name">magenta</div><div class="hex">#E94FA1</div><div class="use">highlight</div></div>
  <div class="sw"><div class="chip" style="background:var(--iridescent-cyan)"></div><div class="name">cyan</div><div class="hex">#2FE6D6</div><div class="use">highlight</div></div>
</div>
</body>
</html>
