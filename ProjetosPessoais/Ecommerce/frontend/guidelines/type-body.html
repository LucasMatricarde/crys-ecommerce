<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg-base); padding: 22px 24px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .body-lg { font-family: var(--font-body); font-weight: 400; font-size: 18px; line-height: 28px; color: var(--text-primary); }
  .body { font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 24px; color: var(--text-muted); }
  .mono { font-family: var(--font-mono); font-size: 16px; color: var(--accent-primary); }
  .label { font-family: var(--font-body); font-weight: 600; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; color: var(--trichome-frost); }
</style>
</head>
<body>
<div class="stack">
  <div><div class="meta">Body Large · Inter 18/28</div><div class="body-lg">Extrações artesanais de cannabis.</div></div>
  <div><div class="meta">Body · Inter 16/24</div><div class="body">Pureza, potência e design que você merece.</div></div>
  <div><div class="meta">Label · Inter SemiBold 13 · tracked</div><div class="label">Adicionar ao carrinho</div></div>
  <div><div class="meta">Mono / Data · Space Mono</div><div class="mono">THC 26% · CBD 0.8% · R$ 89,90</div></div>

</body>
</html>
