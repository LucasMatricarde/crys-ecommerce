server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # CORS is configured in SecurityConfig (Spring Security .cors()) so it covers both
      # routed paths and the local /api/auth/token controller. Do not re-add globalcors
      # here — it would double the Access-Control-Allow-Origin header on routed responses.
      routes:
        - id: catalog
          uri: ${CATALOG_URI:http://localhost:8081}
          predicates:
            - Path=/api/catalog/**
          filters:
            - RewritePath=/api/catalog/(?<segment>.*), /catalog/$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"
        - id: orders
          uri: ${ORDER_URI:http://localhost:8082}
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders(?<segment>/?.*), /orders$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"
        - id: order-views
          uri: ${ORDER_QUERY_URI:http://localhost:8085}
          predicates:
            - Path=/api/order-views/**
          filters:
            - RewritePath=/api/order-views(?<segment>/?.*), /order-views$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"
        - id: notifications
          uri: ${NOTIFICATION_URI:http://localhost:8086}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications(?<segment>/?.*), /notifications$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Gateway JWT auth. HS256 symmetric secret (no external IdP in this increment).
# The default below is DEV-ONLY (>=32 chars, required by HS256); prod MUST override
# JWT_SECRET with a real secret.
crys:
  auth:
    secret: ${JWT_SECRET:crys-dev-only-secret-change-me-in-production-0123456789}
    issuer: crys-gateway
    token-ttl: 1h
