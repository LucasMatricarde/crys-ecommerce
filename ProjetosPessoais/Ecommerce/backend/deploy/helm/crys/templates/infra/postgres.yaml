{{- $pg := .Values.infra.postgres -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    {{- include "crys.labels" . | nindent 4 }}
data:
  # Mirrors backend/infra/postgres/init/01-databases.sql — one DB per transactional service.
  01-databases.sql: |
    CREATE DATABASE crys_order;
    CREATE DATABASE crys_inventory;
    CREATE DATABASE crys_payment;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "crys.labels" . | nindent 4 }}
    {{- include "crys.selectorLabels" "postgres" | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "crys.selectorLabels" "postgres" | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "crys.labels" . | nindent 4 }}
    {{- include "crys.selectorLabels" "postgres" | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "crys.selectorLabels" "postgres" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crys.labels" . | nindent 8 }}
        {{- include "crys.selectorLabels" "postgres" | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ $pg.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ $pg.db | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: crys-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crys-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.secrets.dbUser }}"]
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $pg.storage }}
