{{- /*
Shared secret env for all services.
DEV DEFAULTS ONLY. PROD MUST OVERRIDE — esp. JWT_SECRET (gateway HS256 signing key,
>=32 chars) and DB_PASSWORD. Override at install:
  helm install crys ./deploy/helm/crys --set secrets.jwtSecret=... --set secrets.dbPassword=...
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: crys-secrets
  labels:
    {{- include "crys.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
