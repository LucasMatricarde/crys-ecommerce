name: crys

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: crys
      POSTGRES_PASSWORD: crys
      POSTGRES_DB: crys
    ports: ["5432:5432"]
    volumes:
      - "pgdata:/var/lib/postgresql/data"
      - "./postgres/init:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crys"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [crys]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongodata:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [crys]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [crys]

  kafka:
    image: apache/kafka:3.8.1
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes: ["kafkadata:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [crys]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks: [crys]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks: [crys]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: crys
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
    networks: [crys]

  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: seed
      MONGODB_URI: mongodb://mongo:27017/crys
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports: ["8081:8081"]
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [crys]

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      REDIS_HOST: redis
      CATALOG_URI: http://catalog-service:8081
      ORDER_URI: http://order-service:8082
      ORDER_QUERY_URI: http://order-query-service:8085
      NOTIFICATION_URI: http://notification-service:8086
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      # Fixed dev secret for JWT signing/validation. PROD MUST OVERRIDE with a real secret.
      JWT_SECRET: crys-dev-only-secret-change-me-in-production-0123456789
    ports: ["8080:8080"]
    depends_on:
      redis: { condition: service_healthy }
      catalog-service: { condition: service_started }
      order-service: { condition: service_started }
      order-query-service: { condition: service_started }
      notification-service: { condition: service_started }
    networks: [crys]

  order-service:
    build:
      context: ..
      dockerfile: services/order-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/crys_order
      DB_USER: crys
      DB_PASSWORD: crys
      KAFKA_BOOTSTRAP: kafka:9092
      CATALOG_URI: http://catalog-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports: ["8082:8082"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      catalog-service: { condition: service_started }
    networks: [crys]

  inventory-service:
    build:
      context: ..
      dockerfile: services/inventory-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: seed
      DB_URL: jdbc:postgresql://postgres:5432/crys_inventory
      DB_USER: crys
      DB_PASSWORD: crys
      KAFKA_BOOTSTRAP: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports: ["8083:8083"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [crys]

  payment-service:
    build:
      context: ..
      dockerfile: services/payment-service/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/crys_payment
      DB_USER: crys
      DB_PASSWORD: crys
      KAFKA_BOOTSTRAP: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports: ["8084:8084"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [crys]

  order-query-service:
    build:
      context: ..
      dockerfile: services/order-query-service/Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017/crys_order_query
      KAFKA_BOOTSTRAP: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports: ["8085:8085"]
    depends_on:
      mongo: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [crys]

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017/crys_notification
      KAFKA_BOOTSTRAP: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports: ["8086:8086"]
    depends_on:
      mongo: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [crys]

volumes:
  pgdata:
  mongodata:
  kafkadata:

networks:
  crys:
    driver: bridge
